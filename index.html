<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <title>Goratrack - App de Rondines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .btn-massive {
            min-height: 70px;
            touch-action: manipulation;
        }

        [x-cloak] {
            display: none !important;
        }

        #reader video {
            border-radius: 0.5rem;
            object-fit: cover;
        }

        .photo-slot {
            aspect-ratio: 1;
            border: 2px dashed #475569;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #1e293b;
        }

        .photo-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body x-data="guardApp()" class="flex flex-col h-screen overflow-hidden">

    <!-- Reproductor de Sonido Oculto -->
    <audio id="scanSound" src="https://rondines.goratrack.link/prip.mp3" preload="auto"></audio>

    <!-- Toast Notifications -->
    <div x-show="toast.show" x-transition x-cloak
        class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[60] px-6 py-3 rounded-full shadow-2xl font-bold text-sm whitespace-nowrap"
        :class="{'bg-emerald-500 text-white': toast.type === 'success', 'bg-red-500 text-white': toast.type === 'error', 'bg-amber-500 text-slate-900': toast.type === 'warning'}">
        <span x-text="toast.message"></span>
    </div>

    <!-- Botón Flotante de Sincronización Manual (Visual Original) -->
    <div class="fixed top-20 right-4 z-50">
        <button @click="syncAllPending()" x-show="(roundsQueue.length > 0 || reportQueue.length > 0)" x-cloak
            :disabled="isSyncing"
            :class="isSyncing ? 'opacity-75 cursor-not-allowed bg-slate-600' : 'bg-blue-600 hover:bg-blue-500'"
            class="text-white px-5 py-3 rounded-full shadow-xl shadow-blue-900/50 font-bold flex items-center space-x-2 transition-all">

            <svg x-show="!isSyncing" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
            <svg x-show="isSyncing" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <span x-text="isSyncing ? 'Subiendo...' : (roundsQueue.length + reportQueue.length) + ' Pendientes'"></span>
        </button>
    </div>

    <!-- PANTALLA LOGIN -->
    <div x-show="!isLoggedIn" x-transition.opacity
        class="flex-1 flex flex-col items-center justify-center p-6 bg-slate-900 z-50 absolute inset-0">
        <div class="w-full max-w-sm bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
            <div class="text-center mb-8">
                <img src="https://goratrack.tecuidamos.mx/img/logo.png" alt="Goratrack"
                    class="h-16 mx-auto mb-4 filter brightness-200">
                <h2 class="text-2xl font-black tracking-tight">Acceso Guardia</h2>
                <p class="text-slate-400 text-sm mt-1">Ingrese su PIN de seguridad</p>
            </div>

            <form @submit.prevent="login" class="space-y-6">
                <div>
                    <input type="password" x-model="pin" inputmode="numeric" pattern="[0-9]*" placeholder="••••"
                        required
                        class="w-full text-center text-4xl tracking-widest bg-slate-900 border-2 border-slate-700 text-white rounded-xl py-4 focus:ring-4 focus:ring-blue-500/50 focus:border-blue-500 transition outline-none">
                </div>
                <button type="submit" :disabled="isLoading"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl text-lg transition disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-blue-600/30">
                    <span x-show="!isLoading">INICIAR TURNO</span>
                    <span x-show="isLoading" class="animate-pulse">VERIFICANDO...</span>
                </button>
            </form>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL (DASHBOARD) -->
    <div x-show="isLoggedIn" x-cloak class="flex-1 flex flex-col h-full">
        <!-- Header -->
        <header
            class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center shrink-0 shadow-md">
            <div>
                <h1 class="font-black text-xl tracking-tight text-white">Goratrack</h1>
                <p class="text-emerald-400 text-xs font-bold uppercase tracking-wider flex items-center">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></span>
                    Turno Activo - <span x-text="sessionData?.tenant_name || 'Cargando...'"
                        class="ml-1 text-slate-300"></span>
                </p>
            </div>
            <button @click="confirmLogout"
                class="text-slate-400 hover:text-white transition p-2 bg-slate-700/50 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </header>

        <main class="flex-1 overflow-y-auto p-6 space-y-6 pb-24 relative">
            <div class="grid grid-cols-1 gap-4 mt-6">
                <!-- Link Registro / Bitácora -->
                <div class="flex justify-between items-center px-1">
                    <button @click="showLog = true"
                        class="text-xs text-blue-400 hover:text-blue-300 font-semibold flex items-center space-x-1 transition">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
                            </path>
                        </svg>
                        <span>Registro</span>
                    </button>
                    <span class="text-xs text-slate-500"
                        x-text="'Hoy: ' + getTodayRoundsCount() + ' rondín(es)'"></span>
                </div>
                <button @click="startScanning"
                    class="btn-massive bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-6 shadow-lg shadow-blue-900/50 flex flex-col items-center justify-center space-y-3 transform active:scale-95 transition">
                    <div class="bg-white/20 p-4 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                        </svg>
                    </div>
                    <span class="font-bold text-xl tracking-wide">Escanear Rondín</span>
                </button>

                <button @click="finalizeRound()" x-show="pendingQueue.length > 0" x-cloak
                    class="btn-massive bg-emerald-600 border border-emerald-500 rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center space-y-3 transform active:scale-95 transition">
                    <div class="bg-emerald-700 p-4 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <span class="font-bold text-xl tracking-wide text-white">Finalizar Rondín (<span
                            x-text="pendingQueue.length"></span>)</span>
                </button>

                <button @click="openReportModal"
                    class="btn-massive bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center space-y-3 transform active:scale-95 transition">
                    <div class="bg-slate-700 p-4 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-rose-400" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                    <span class="font-bold text-xl tracking-wide text-slate-300">Reportar Incidencia</span>
                </button>
            </div>

            <!-- Diagnóstico de errores de red (Nuevo) -->
            <div x-show="syncError"
                class="mt-4 p-3 bg-red-900/50 border border-red-500 rounded-lg text-xs text-red-200">
                <p class="font-bold mb-1">Error de sincronización:</p>
                <p x-text="syncError"></p>
            </div>
        </main>
    </div>

    <!-- MODAL BITÁCORA / REGISTRO -->
    <div x-show="showLog" x-cloak class="fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-sm overflow-y-auto">
        <div class="min-h-screen flex items-start justify-center p-4 pt-8">
            <div class="bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl border border-slate-700 overflow-hidden">
                <div
                    class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center sticky top-0 z-10">
                    <h3 class="font-black text-lg text-white">Bitácora del Turno</h3>
                    <button @click="showLog = false" class="text-slate-400 hover:text-white p-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="p-5 space-y-5">
                    <!-- Resumen del día -->
                    <div class="bg-slate-900 rounded-xl p-4 flex justify-around text-center">
                        <div>
                            <p class="text-2xl font-black text-blue-400" x-text="pendingQueue.length"></p>
                            <p class="text-xs text-slate-400 font-bold">Escaneos Actuales</p>
                        </div>
                        <div class="border-l border-slate-700"></div>
                        <div>
                            <p class="text-2xl font-black text-emerald-400" x-text="getTodayRoundsCount()"></p>
                            <p class="text-xs text-slate-400 font-bold">Rondines Hoy</p>
                        </div>
                    </div>

                    <!-- Escaneos pendientes -->
                    <div>
                        <h4 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider">Escaneos en Curso
                        </h4>
                        <div x-show="pendingQueue.length === 0" class="text-center py-6">
                            <p class="text-slate-500 text-sm">Sin escaneos pendientes</p>
                        </div>
                        <div class="space-y-2 max-h-60 overflow-y-auto">
                            <template x-for="(scan, i) in pendingQueue" :key="i">
                                <div class="bg-slate-900 rounded-lg p-3 flex justify-between items-center">
                                    <div class="flex items-center space-x-3">
                                        <div class="bg-blue-600/20 p-2 rounded-lg">
                                            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor"
                                                viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
                                                </path>
                                            </svg>
                                        </div>
                                        <div>
                                            <p class="text-sm font-bold text-white" x-text="scan.checkpointName"></p>
                                            <p class="text-xs text-slate-500"
                                                x-text="new Date(scan.scanned_at).toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit', second:'2-digit'})">
                                            </p>
                                        </div>
                                    </div>
                                    <span class="text-xs text-blue-400 font-bold" x-text="'#' + (i + 1)"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Rondines completados hoy -->
                    <div>
                        <h4 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider">Rondines Completados
                            Hoy</h4>
                        <div x-show="getTodayRounds().length === 0" class="text-center py-6">
                            <p class="text-slate-500 text-sm">Ningún rondín finalizado hoy</p>
                        </div>
                        <div class="space-y-2 max-h-60 overflow-y-auto">
                            <template x-for="(round, ri) in getTodayRounds()" :key="ri">
                                <div class="bg-slate-900 rounded-lg p-3">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-sm font-bold text-emerald-400" x-text="round.round_id"></span>
                                        <span class="text-xs text-slate-500"
                                            x-text="round.scans.length + ' puntos'"></span>
                                    </div>
                                    <div class="text-xs text-slate-400 flex justify-between">
                                        <span
                                            x-text="'Inicio: ' + new Date(round.start_time).toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'})"></span>
                                        <span
                                            x-text="'Fin: ' + new Date(round.end_time).toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'})"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="isScanning" x-cloak class="fixed inset-0 z-[100] bg-black flex flex-col">
        <div class="flex-1 relative">
            <div id="reader" class="w-full h-full"></div>
            <div class="absolute inset-0 border-[16px] border-black/50 pointer-events-none"></div>
            <div
                class="absolute inset-x-0 top-1/2 -mt-32 h-64 border-y-2 border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.5)] pointer-events-none">
                <div class="w-full h-0.5 bg-emerald-500/50 animate-[scan_2s_ease-in-out_infinite]"></div>
            </div>
        </div>
        <div class="bg-slate-900 p-6 shrink-0 flex justify-between items-center pb-8">
            <p class="text-emerald-400 font-bold animate-pulse flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z">
                    </path>
                </svg>
                Buscando QR...
            </p>
            <button @click="stopScanning"
                class="bg-rose-600 hover:bg-rose-500 px-6 py-3 rounded-xl font-bold transition shadow-lg shadow-rose-900/50">Cancelar</button>
        </div>
    </div>

    <!-- MODAL REPORTE INCIDENCIA (DISEÑO ORIGINAL RESTAURADO) -->
    <div x-show="isReporting" x-cloak class="fixed inset-0 z-[100] bg-slate-900/95 backdrop-blur-sm overflow-y-auto">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="bg-slate-800 w-full max-w-md rounded-3xl shadow-2xl border border-slate-700 overflow-hidden"
                @click.away="closeReportModal">
                <div
                    class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center sticky top-0 z-10">
                    <h3 class="font-black text-lg text-white">Nueva Incidencia</h3>
                    <button @click="closeReportModal" class="text-slate-400 hover:text-white p-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="p-6 space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-400 mb-2">Clasificación</label>
                        <select x-model="reportType"
                            class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent font-bold">
                            <option value="" disabled>-- Seleccione una incidencia --</option>
                            <option value="Zona vulnerable">Zona vulnerable</option>
                            <option value="Fugas">Fugas</option>
                            <option value="Luminarias">Luminarias</option>
                            <option value="Suspensión de rondín">Suspensión de rondín</option>
                            <option value="Zona de riesgo">Zona de riesgo</option>
                            <option value="Desorganización">Desorganización</option>
                            <option value="Objetos fuera de lugar">Objetos fuera de lugar</option>
                            <option value="Otras">Otras</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-400 mb-2">Evidencia Fotográfica (hasta
                            3)</label>
                        <input type="file" accept="image/*" capture="environment" id="cameraInput0" class="hidden"
                            @change="handlePhotoUpload($event, 0)">
                        <input type="file" accept="image/*" capture="environment" id="cameraInput1" class="hidden"
                            @change="handlePhotoUpload($event, 1)">
                        <input type="file" accept="image/*" capture="environment" id="cameraInput2" class="hidden"
                            @change="handlePhotoUpload($event, 2)">

                        <div class="grid grid-cols-3 gap-3">
                            <template x-for="(photo, idx) in photosBase64" :key="idx">
                                <div>
                                    <div x-show="!photosBase64[idx]"
                                        @click="document.getElementById('cameraInput' + idx).click()"
                                        class="photo-slot cursor-pointer w-full h-28">
                                        <div class="text-center">
                                            <svg class="w-8 h-8 text-slate-500 mx-auto mb-1" fill="none"
                                                stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
                                                </path>
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                            </svg>
                                            <span class="text-xs font-bold text-slate-400"
                                                x-text="'Foto ' + (idx + 1)"></span>
                                        </div>
                                    </div>

                                    <div x-show="photosBase64[idx]"
                                        class="relative w-full h-28 rounded-xl overflow-hidden border-2 border-slate-700">
                                        <img :src="photosBase64[idx]" class="w-full h-full object-cover">
                                        <button @click="photosBase64[idx] = null"
                                            class="absolute top-1 right-1 bg-slate-900/80 p-1.5 rounded-full text-white backdrop-blur">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M6 18L18 6M6 6l12 12"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-400 mb-2">Comentarios Adicionales</label>
                        <textarea x-model="reportComment" rows="3"
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                            placeholder="Describa la situación..."></textarea>
                    </div>

                    <button @click="submitReport" :disabled="!reportType || isSubmitting"
                        class="w-full bg-rose-600 hover:bg-rose-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-bold py-4 rounded-xl text-lg transition flex items-center justify-center">
                        <span x-show="!isSubmitting">Guardar Incidencia Local</span>
                        <span x-show="isSubmitting" class="animate-pulse">Procesando GPS...</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes scan {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(256px);
            }

            100% {
                transform: translateY(0);
            }
        }
    </style>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('guardApp', () => {
                return {
                    isLoggedIn: false, isLoading: false, pin: '',
                    authUrl: 'https://rondines.goratrack.link/api/auth.php',
                    apiUrlAdmin: 'https://rondines.goratrack.link/api/admin.php',
                    apiUrl: 'https://rondines.goratrack.link/api/sync.php', // API para Rondines (exige formato Rounds)
                    apiReportUrl: 'https://rondines.goratrack.link/api/reports.php', // NUEVA API de reportes corporativa
                    apiUrlSetup: 'https://rondines.goratrack.link/api/setup_qr.php', // API de auto-configuración de QR

                    user_id: null, tenant_id: null,
                    html5QrcodeScanner: null, isScanning: false, lastScanTime: 0,

                    toast: { show: false, message: '', type: 'success' },
                    showLog: false, // Modal bitácora

                    isReporting: false, isSubmitting: false,
                    reportType: '', reportComment: '', photosBase64: [null, null, null],

                    // OFFLINE-FIRST: Listas de almacenamiento local
                    pendingQueue: [],
                    roundsQueue: [],
                    reportQueue: [],
                    isSyncing: false,
                    sessionData: null,
                    knownCheckpoints: [], // NUEVO: Almacén local de puntos

                    init() {
                        const storedUser = localStorage.getItem('guard_id');
                        const storedTenant = localStorage.getItem('guard_tenant');
                        const storedSession = localStorage.getItem('gora_session');
                        if (storedUser && storedTenant) {
                            this.user_id = storedUser;
                            this.tenant_id = storedTenant;
                            if (storedSession) {
                                this.sessionData = JSON.parse(storedSession);
                            }
                            this.isLoggedIn = true;
                            this.fetchCheckpoints(); // Cargar puntos si ya está logueado
                        }

                        this.loadPendingQueue();
                        this.loadRoundsQueue();
                        this.loadReportQueue();
                    },

                    loadRoundsQueue() {
                        const stored = localStorage.getItem('guard_rounds_queue');
                        if (stored) this.roundsQueue = JSON.parse(stored);
                    },
                    saveRoundsQueue() {
                        localStorage.setItem('guard_rounds_queue', JSON.stringify(this.roundsQueue));
                    },

                    loadPendingQueue() {
                        const stored = localStorage.getItem('guard_pending_queue');
                        if (stored) this.pendingQueue = JSON.parse(stored);
                    },
                    savePendingQueue() {
                        localStorage.setItem('guard_pending_queue', JSON.stringify(this.pendingQueue));
                    },
                    loadReportQueue() {
                        const stored = localStorage.getItem('guard_report_queue');
                        if (stored) this.reportQueue = JSON.parse(stored);
                    },
                    saveReportQueue() {
                        localStorage.setItem('guard_report_queue', JSON.stringify(this.reportQueue));
                    },

                    showToast(msg, type = 'success') {
                        this.toast.message = msg;
                        this.toast.type = type;
                        this.toast.show = true;
                        setTimeout(() => { this.toast.show = false; }, 4000);
                    },

                    async login() {
                        if (this.pin.length < 4) return this.showToast('PIN muy corto', 'error');
                        this.isLoading = true;
                        try {
                            const res = await fetch(this.authUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ pin: this.pin })
                            });
                            const data = await res.json();

                            if (res.ok && data.status === 'success') {
                                this.user_id = data.user.user_id;
                                this.tenant_id = data.user.tenant_id;
                                this.sessionData = data.user;
                                localStorage.setItem('guard_id', this.user_id);
                                localStorage.setItem('guard_tenant', this.tenant_id);
                                localStorage.setItem('gora_session', JSON.stringify(this.sessionData));
                                this.isLoggedIn = true;
                                this.showToast('Acceso concedido');
                                this.fetchCheckpoints(); // NUEVO: Cargar puntos al loguearse
                            } else {
                                this.showToast(data.message || 'PIN incorrecto', 'error');
                            }
                        } catch (e) {
                            this.showToast('Error de red. Intente de nuevo', 'error');
                        } finally {
                            this.isLoading = false;
                        }
                    },

                    confirmLogout() {
                        if (!confirm('¿Está seguro que desea cerrar sesión?')) return;
                        this.logout();
                    },

                    logout() {
                        localStorage.removeItem('guard_id');
                        localStorage.removeItem('guard_tenant');
                        localStorage.removeItem('gora_session');
                        localStorage.removeItem('gora_checkpoints_cache'); // Limpiar caché de puntos
                        this.sessionData = null;
                        this.isLoggedIn = false;
                        this.pin = '';
                    },

                    getTodayRounds() {
                        const today = new Date().toISOString().slice(0, 10); // 'YYYY-MM-DD'
                        return this.roundsQueue.filter(r => r.end_time && r.end_time.slice(0, 10) === today);
                    },

                    getTodayRoundsCount() {
                        return this.getTodayRounds().length;
                    },

                    // NUEVO: Descargar y guardar lista de puntos
                    async fetchCheckpoints() {
                        if (!this.tenant_id) return;
                        try {
                            const res = await fetch(`${this.apiUrlAdmin}?tenant_id=${this.tenant_id}`);
                            if (res.ok) {
                                this.knownCheckpoints = await res.json();
                                localStorage.setItem('gora_checkpoints_cache', JSON.stringify(this.knownCheckpoints));
                            }
                        } catch (e) {
                            const cached = localStorage.getItem('gora_checkpoints_cache');
                            if (cached) this.knownCheckpoints = JSON.parse(cached);
                        }
                    },

                    getCurrentLocation() {
                        return new Promise((resolve, reject) => {
                            if (!navigator.geolocation) {
                                resolve({ lat: null, lng: null });
                                return;
                            }
                            navigator.geolocation.getCurrentPosition(
                                (position) => {
                                    resolve({ lat: position.coords.latitude, lng: position.coords.longitude });
                                },
                                (err) => {
                                    resolve({ lat: null, lng: null });
                                },
                                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                            );
                        });
                    },

                    // --- ESCANEO DE QR ---
                    startScanning() {
                        this.isScanning = true;
                        this.$nextTick(() => {
                            this.html5QrcodeScanner = new Html5Qrcode("reader");
                            this.html5QrcodeScanner.start(
                                { facingMode: "environment" },
                                { fps: 10, qrbox: { width: 250, height: 250 } },
                                this.handleValidQR.bind(this)
                            ).catch(err => {
                                this.showToast('Error accediendo a cámara', 'error');
                                this.stopScanning();
                            });
                        });
                    },

                    stopScanning() {
                        this.isScanning = false;
                        if (this.html5QrcodeScanner) {
                            this.html5QrcodeScanner.stop().then(() => {
                                this.html5QrcodeScanner.clear();
                            });
                        }
                    },

                    async handleValidQR(decodedText) {
                        const now = Date.now();
                        if (now - this.lastScanTime < 3000) return;
                        this.lastScanTime = now;

                        this.stopScanning();

                        // NUEVO: Reproducir sonido de escaneo exitoso
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                        try {
                            const sound = document.getElementById('scanSound');
                            if (sound) { sound.currentTime = 0; sound.play(); }
                        } catch (err) { }

                        this.showToast('Obteniendo GPS...', 'warning');

                        try {
                            const loc = await this.getCurrentLocation();

                            // Buscar el nombre del punto en la caché LOCAL (Offline)
                            let pointName = "Punto Desconocido";
                            let matchedPoint = null;
                            const cachedPoints = localStorage.getItem('gora_checkpoints_cache');
                            let checkpointsList = [];
                            if (cachedPoints) {
                                checkpointsList = JSON.parse(cachedPoints);
                                matchedPoint = checkpointsList.find(cp => cp.uuid === decodedText);
                                if (matchedPoint) {
                                    pointName = matchedPoint.name;
                                }
                            }

                            // Validar si el punto existe en el catálogo
                            if (pointName === "Punto Desconocido") {
                                this.showToast('Punto no registrado en catálogo', 'error');
                                return; // Detener ejecución y no guardar
                            }

                            // AUTO-CONFIGURACIÓN: Si el punto no tiene coordenadas, es primera vez
                            if (matchedPoint && (matchedPoint.expected_lat === null || matchedPoint.expected_lat === undefined || matchedPoint.expected_lat === '')) {
                                this.showToast('Ajustando sistema por primera vez...', 'warning');
                                try {
                                    const setupRes = await fetch(this.apiUrlSetup, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ uuid: decodedText, lat: loc.lat, lng: loc.lng })
                                    });
                                    if (setupRes.ok) {
                                        // Actualizar caché local con las coordenadas configuradas
                                        matchedPoint.expected_lat = loc.lat;
                                        matchedPoint.expected_lng = loc.lng;
                                        localStorage.setItem('gora_checkpoints_cache', JSON.stringify(checkpointsList));
                                    } else {
                                        this.showToast('Error configurando punto en servidor', 'error');
                                    }
                                } catch (setupErr) {
                                    this.showToast('Sin señal para configurar. El escaneo continúa.', 'error');
                                }
                            }

                            // Guardar en la cola offline
                            const scanRecord = {
                                point_uuid: decodedText,
                                checkpointName: pointName,
                                scanned_at: new Date().toISOString(),
                                lat: loc.lat,
                                lng: loc.lng,
                                distance: 0,
                                isValid: 1
                            };

                            this.pendingQueue.push(scanRecord);
                            this.savePendingQueue();

                            this.showToast(pointName + " Escaneado", "success");

                        } catch (error) {
                            this.showToast("Error guardando punto localmente.", "error");
                        }
                    },

                    // --- REPORTES ---
                    openReportModal() {
                        this.isReporting = true;
                        this.reportType = '';
                        this.reportComment = '';
                        this.photosBase64 = [null, null, null];
                    },

                    closeReportModal() {
                        this.isReporting = false;
                    },

                    handlePhotoUpload(event, slotIndex) {
                        const file = event.target.files[0];
                        if (!file) return;

                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 800;
                                const scaleSize = MAX_WIDTH / img.width;
                                canvas.width = MAX_WIDTH;
                                canvas.height = img.height * scaleSize;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                this.photosBase64[slotIndex] = canvas.toDataURL('image/jpeg', 0.6);
                            };
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                        event.target.value = ''; // Reset para permitir re-seleccionar misma foto
                    },

                    async submitReport() {
                        this.isSubmitting = true;
                        try {
                            const loc = await this.getCurrentLocation();

                            const reportRecord = {
                                report_type: this.reportType,
                                comment: this.reportComment,
                                photos_base64: [...this.photosBase64],
                                scanned_at: new Date().toISOString(),
                                lat: loc.lat,
                                lng: loc.lng
                            };

                            this.reportQueue.push(reportRecord);
                            this.saveReportQueue();

                            this.showToast("Reporte guardado. Pendiente de sincronizar.", "success");
                            this.closeReportModal();
                        } catch (error) {
                            this.showToast('Error procesando el reporte.', 'error');
                        } finally {
                            this.isSubmitting = false;
                        }
                    },

                    // --- FINALIZAR RONDÍN ---
                    finalizeRound() {
                        if (this.pendingQueue.length === 0) {
                            this.showToast("No hay escaneos pendientes para finalizar.", "warning");
                            return;
                        }

                        if (!confirm("¿Está seguro de que desea finalizar y cerrar este rondín?")) {
                            return;
                        }

                        // Crear el bloque lógico con timestamp de cierre
                        const endTime = new Date().toISOString();
                        const roundPayload = {
                            tenant_id: this.tenant_id,
                            user_id: this.user_id,
                            round_id: 'RND-' + Date.now().toString().slice(-6),
                            shift: 'Diurno', // Podría ser dinámico si se requiere
                            start_time: this.pendingQueue[0].scanned_at,
                            end_time: endTime,
                            scans: this.pendingQueue.map(scan => ({
                                uuid: scan.point_uuid,
                                checkpointName: scan.checkpointName || 'Punto Recuperado',
                                timestamp: scan.scanned_at,
                                lat: scan.lat,
                                lng: scan.lng,
                                distance: scan.distance || 0,
                                isValid: scan.isValid !== undefined ? scan.isValid : 1
                            }))
                        };

                        this.roundsQueue.push(roundPayload);
                        this.saveRoundsQueue();

                        this.pendingQueue = [];
                        this.savePendingQueue();

                        this.showToast("Rondín finalizado y guardado.", "success");
                        this.syncAllPending(); // Intentar subir inmediatamente si hay conexión
                    },

                    // --- TRADUCTOR JSON Y MOTOR DE SINCRONIZACIÓN ---
                    async syncAllPending() {
                        if (this.isSyncing) return;
                        if (!navigator.onLine) {
                            this.showToast("No hay señal. Revise su conexión de datos.", "error");
                            return;
                        }

                        this.isSyncing = true;
                        this.syncError = '';
                        let totalSynced = 0;
                        let totalFailed = 0;

                        // 1. SINCRONIZAR ESCANEOS (Traducción a formato "Rondas")
                        if (this.roundsQueue.length > 0) {
                            const failedRounds = [];
                            for (let round of this.roundsQueue) {
                                try {
                                    const res = await fetch(this.apiUrl, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ rounds: [round] })
                                    });

                                    if (res.ok) {
                                        totalSynced += round.scans.length;
                                    } else {
                                        failedRounds.push(round);
                                        totalFailed += round.scans.length;
                                        this.syncError += "Error en BD de Escaneos. ";
                                    }
                                } catch (e) {
                                    failedRounds.push(round);
                                    totalFailed += round.scans.length;
                                    this.syncError += "Red falló al enviar escaneos. ";
                                }
                            }
                            this.roundsQueue = failedRounds;
                            this.saveRoundsQueue();
                        }

                        // 2. SINCRONIZAR REPORTES (Traducción al nuevo formato Corporativo)
                        if (this.reportQueue.length > 0) {
                            const failedReports = [];

                            for (let report of this.reportQueue) {
                                try {
                                    // Mapeamos los datos viejos a los nombres de variables nuevos
                                    let mapCategory = report.report_type;
                                    if (mapCategory === 'otro') mapCategory = 'Otro / Novedad';
                                    if (mapCategory === 'puerta_abierta') mapCategory = 'Puerta Abierta';
                                    if (mapCategory === 'luminaria_apagada') mapCategory = 'Foco Fundido';
                                    if (mapCategory === 'vehiculo_sospechoso') mapCategory = 'Vehículo Sospechoso';

                                    const repPayload = {
                                        folio: 'REP-' + Date.now().toString().slice(-6),
                                        tenant_id: this.tenant_id,
                                        user_id: this.user_id,
                                        category: mapCategory,
                                        description: report.comment,
                                        photos: report.photos_base64 || [report.photo_base64 || null, null, null], // Compatible con reportes viejos y nuevos
                                        lat: report.lat,
                                        lng: report.lng,
                                        timestamp: report.scanned_at
                                    };

                                    const res = await fetch(this.apiReportUrl, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ reports: [repPayload] })
                                    });

                                    if (res.ok) {
                                        totalSynced++;
                                    } else {
                                        failedReports.push(report);
                                        totalFailed++;
                                        this.syncError += "Error en BD de Reportes. ";
                                    }
                                } catch (e) {
                                    failedReports.push(report);
                                    totalFailed++;
                                    this.syncError += "Red falló al enviar reporte. ";
                                }
                            }

                            this.reportQueue = failedReports;
                            this.saveReportQueue();
                        }

                        this.isSyncing = false;

                        // Feedback Final al Usuario
                        if (totalFailed === 0 && totalSynced > 0) {
                            this.showToast(totalSynced + " registro(s) subido(s) al Centro de Mando.", "success");
                        } else if (totalFailed > 0 && totalSynced > 0) {
                            this.showToast(totalSynced + " subidos, pero fallaron " + totalFailed + ". Intente de nuevo.", "warning");
                        } else if (totalFailed > 0 && totalSynced === 0) {
                            this.showToast("No hay señal estable. Intente de nuevo.", "error");
                        }
                    }
                };
            });
        });
    </script>
